name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Download images
        run: |
          mkdir -p public/images
          curl -fL -o public/images/profile.jpg "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=400&auto=format&fit=crop"
          curl -fL -o public/images/hero-bg.jpg "https://images.unsplash.com/photo-1490806678282-484c3765e177?q=80&w=1200&auto=format&fit=crop"
          curl -fL -o public/images/van.jpg "https://images.unsplash.com/photo-1517673132405-a56a62b18caf?q=80&w=800&auto=format&fit=crop"
          curl -fL -o public/images/line-qr.png "https://qr-official.line.me/gs/M_771sxuxl_GW.png"

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /TAKE/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4